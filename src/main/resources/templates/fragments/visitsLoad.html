<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="visits-fragment">
    <article class="card" th:each="r : ${seznamRecenzi}">
        <div class="card-image-placeholder">
            <th:block th:if="${r.idTitulniFotky != null}">
                <img th:src="@{/image/fotka/{id}(id=${r.idTitulniFotky})}"
                     alt="Náhled recenze"
                     style="width: 100%; height: 200px; object-fit: cover;"
                     loading="lazy">
            </th:block>

            <th:block th:if="${r.idTitulniFotky == null}">
                <div style="width: 100%; height: 200px; background: #eee; display: flex; align-items: center; justify-content: center;">
                    <span class="material-symbols-outlined" style="font-size: 48px; color: #ccc;">image</span>
                </div>
            </th:block>
        </div>

        <div class="card-content">
            <h3 th:text="${r.podnik?.nazev}">Bar Xyz</h3>

            <div class="rating">
                <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                        <span class="material-symbols-outlined"
                                              th:classappend="${i <= r.hodnoceni} ? 'filled' : ''">
                                            star
                                        </span>
                </th:block>
            </div>

            <a class="show-more" th:href="@{/review/{id}(id=${r.idObsahu})}">Show more</a>
        </div>
    </article>
</th:block>
</html>
